# Added due to required but conditional checks
# Read more: https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-protected-branches/troubleshooting-required-status-checks#handling-skipped-but-required-checks

name: 'rust'
on:
  pull_request:
    paths-ignore:
      - 'gui/backend/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust.yml'

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "Not required: did not modify Rust sources"'
  clippy:
    name: cargo clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "Not required: did not modify Rust sources"'
  deny:
    name: cargo deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "Not required: did not modify Rust sources"'
  test:
    # The real rust.yml runs a 3-OS matrix; GitHub records each leg
    # as a separate check name (cargo test (ubuntu-latest), …
    # (macos-latest), … (windows-latest)). Mirror the matrix here so
    # all three names are reported when the real test is skipped.
    name: cargo test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - run: 'echo "Not required: did not modify Rust sources"'
  coverage:
    name: cargo-llvm-cov + ratchet
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "Not required: did not modify Rust sources"'
