# Lefthook — local pre-commit gates so the linters and tests CI runs are
# rarely the first time we hear about a regression.
#
# Hook scope:
#   pre-commit  — fast, file-scoped checks (linters + frontend tests).
#                 Fires only when files in the relevant subtree are staged.
#   pre-push    — heavier checks (clippy, cargo test, bash tests). Skipped
#                 when nothing in that subtree changed.
#
# Setup: `pnpm install` from gui/frontend/ runs `lefthook install` via the
# package.json `prepare` script, which writes the hooks to .git/hooks.
#
# Override / skip: `LEFTHOOK=0 git commit ...` disables all hooks for one
# command. To skip a single check, prefix its name: `LEFTHOOK_EXCLUDE=rust-fmt`.
# Hooks also auto-skip when their `glob` doesn't match any staged file.

pre-commit:
  parallel: true
  commands:
    # `root:` makes the command run from that directory and rewrites
    # {staged_files} to be relative to it; globs are therefore matched
    # against the rewritten (root-relative) paths.

    frontend-lint:
      glob: "**/*.{ts,svelte,js,mjs,cjs,json,css,html}"
      root: "gui/frontend/"
      run: pnpm run lint

    frontend-check:
      glob: "**/*.{ts,svelte}"
      root: "gui/frontend/"
      run: pnpm run check

    frontend-test:
      glob: "**/*.{ts,svelte}"
      root: "gui/frontend/"
      run: pnpm test

    rust-fmt:
      glob: "**/*.rs"
      root: "gui/backend/"
      run: cargo fmt --all -- --check

    # Two shellcheck passes mirror .github/workflows/bash.yml so local
    # runs disagree with CI as little as possible. The disable lists are
    # documented there — same noise (unused globals, subshell-scoped
    # exports) the bats / sourced-script pattern legitimately produces.
    shellcheck-sh:
      # ani-cli and the POSIX-sh helpers run under /bin/sh.
      glob: "{ani-cli,tests/bash/helpers/**/*.sh,tests/arch/*.sh,tools/*.sh}"
      run: shellcheck -s sh -o all -e 2250 -e SC2034 -e SC2086 -e SC2312 {staged_files}

    shellcheck-bash:
      # *.bats and *.bash helpers run under bash with the loader's globals.
      glob: "tests/bash/**/*.{bats,bash}"
      run: |
        shellcheck -s bash \
          -e SC2034 -e SC2086 -e SC2154 -e SC2317 \
          -e SC2030 -e SC2031 -e SC2163 -e SC2181 -e SC2016 \
          {staged_files}

pre-push:
  parallel: true
  commands:
    rust-clippy:
      glob: "**/*.{rs,toml}"
      root: "gui/backend/"
      run: cargo clippy --all-targets --all-features -- -D warnings

    rust-test:
      glob: "**/*.{rs,toml}"
      root: "gui/backend/"
      run: cargo test --all-features
